<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Nurfia</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #fff;
      padding: 40px 36px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 380px;
    }
    .login-card h1 {
      font-size: 22px;
      margin: 0 0 4px;
      text-align: center;
    }
    .login-card p.sub {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin: 0 0 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #000;
    }
    button {
      width: 100%;
      padding: 11px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #loginError {
      color: #c0392b;
      font-size: 13px;
      margin-bottom: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h1>Admin Login</h1>
    <p class="sub">Sign in with your admin account</p>

    <div id="loginError"></div>

    <form id="adminLoginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password" />

      <button type="submit" id="loginBtn">Sign In</button>
    </form>
  </div>

  <script type="module" src="./adminlogin.js"></script>
</body>
</html>
