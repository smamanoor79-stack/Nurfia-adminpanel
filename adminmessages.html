<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Messages – Nurfia</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-header h2 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: .5px;
      color: #1a1a1a;
    }

    .page-header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #555;
      transition: all .15s;
      white-space: nowrap;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: #1c1c1e;
      color: #fff;
      border-color: #1c1c1e;
    }

    .search-box {
      margin-left: auto;
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 12px;
      background: #fff;
      color: #333;
      outline: none;
      width: 220px;
      min-width: 0;
    }

    .search-box:focus {
      border-color: #aaa;
    }

    .table-wrap {
      background: #fff;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid #e8e8e8;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    thead tr {
      border-bottom: 1px solid #eee;
    }

    thead th {
      padding: 13px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      letter-spacing: .8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #f2f2f2;
      transition: background .1s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    tbody tr.unread {
      background: #fafaff;
      font-weight: 600;
    }

    tbody td {
      padding: 14px 16px;
      font-size: 13px;
      color: #333;
      vertical-align: middle;
    }

    .msg-id {
      font-family: monospace;
      color: #555;
      font-size: 12px;
      white-space: nowrap;
    }

    .customer-name {
      font-weight: 500;
    }

    .customer-email {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .subject-cell {
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-unread {
      background: #fff3cd;
      color: #856404;
    }

    .badge-read {
      background: #dbeafe;
      color: #1e40af;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      border-radius: 4px;
      color: #888;
      transition: background .15s, color .15s;
    }

    .action-btn:hover {
      background: #f0f0f0;
      color: #333;
    }

    .action-btn.delete-btn:hover {
      background: #fde2e2;
      color: #c0392b;
    }

    .action-btn svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 10px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 12px;
    }

    .modal-head h3 {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-head p {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 22px;
      color: #aaa;
      line-height: 1;
      flex-shrink: 0;
    }

    .modal-close:hover {
      color: #333;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 22px;
    }

    .detail-item label {
      font-size: 10px;
      color: #999;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .detail-item p {
      font-size: 13px;
      color: #222;
      margin-top: 3px;
      font-weight: 500;
      word-break: break-word;
    }

    .modal-section-title {
      font-size: 11px;
      color: #999;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .message-body {
      font-size: 13px;
      color: #333;
      line-height: 1.7;
      background: #fafafa;
      border: 1px solid #f0f0f0;
      border-radius: 6px;
      padding: 14px 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .btn-update {
      margin-top: 20px;
      width: 100%;
      padding: 11px;
      background: #1c1c1e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-update:hover {
      background: #2e2e32;
    }

    .btn-secondary {
      margin-top: 10px;
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #c0392b;
      border: 1px solid #f0d0d0;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-secondary:hover {
      background: #fde2e2;
    }

    .loading,
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #eee;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1c1c1e;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: all .25s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1023px) {
      .search-box {
        width: 180px;
      }
    }

    @media (max-width: 767px) {
      .page-header h2 {
        font-size: 22px;
      }

      .filters {
        gap: 8px;
      }

      .search-box {
        width: 100%;
        margin-left: 0;
        order: 5;
      }

      tbody td {
        padding: 12px 12px;
        font-size: 12px;
      }

      thead th {
        padding: 10px 12px;
      }

      .customer-email {
        display: none;
      }

      .modal {
        padding: 20px 16px;
      }

      .detail-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .toast {
        left: 16px;
        right: 16px;
        bottom: 16px;
        text-align: center;
      }
    }

    @media (max-width: 400px) {
      .filter-btn {
        padding: 5px 12px;
        font-size: 11px;
      }

      .page-header h2 {
        font-size: 19px;
      }
    }
  </style>
</head>

<body class="admin-body">

  <div class="admin-gate" id="adminGate" style="display:none;">
    <div class="admin-gate-box">
      <i class="fa-solid fa-lock"></i>
      <h2>Admin Access Only</h2>
      <p>You don't have permission to view this page.</p>
      <a href="index.html" class="admin-gate-btn">Back to Home</a>
    </div>
  </div>

  <div class="admin-layout" id="adminLayout" style="display:none;">

    <aside class="admin-sidebar">
      <a href="index.html" class="admin-logo">NURFIA</a>
      <p class="admin-sidebar-label">Admin Panel</p>

      <nav class="admin-nav">
        <a href="index.html" class="admin-nav-item">
          <i class="fa-solid fa-gauge"></i> Dashboard
        </a>
        <a href="adminproduct.html" class="admin-nav-item">
          <i class="fa-solid fa-shirt"></i> Products
        </a>
        <a href="adminorders.html" class="admin-nav-item">
          <i class="fa-solid fa-box"></i> Orders
        </a>
        <a href="adminusers.html" class="admin-nav-item">
          <i class="fa-solid fa-users"></i> Users
        </a>
        <a href="adminmessages.html" class="admin-nav-item active">
          <i class="fa-solid fa-envelope"></i> Messages
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-back-link"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
        <button class="admin-logout-btn" id="adminLogoutBtn">Log Out</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="page-header">
        <div>
          <h2>Messages</h2>
          <p id="msgCount">Loading…</p>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="applyFilter(this)">All</button>
        <button class="filter-btn" data-filter="unread" onclick="applyFilter(this)">Unread</button>
        <button class="filter-btn" data-filter="read" onclick="applyFilter(this)">Read</button>
        <input class="search-box" id="searchInput" type="text" placeholder="Search by name, email or subject…"
          oninput="renderTable()" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>From</th>
              <th>Subject</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="messagesTableBody">
            <tr>
              <td colspan="5">
                <div class="loading">
                  <div class="spinner"></div>Fetching messages…
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Message Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3>Message Details</h3>
          <p id="modalMsgId" class="msg-id"></p>
        </div>
        <button class="modal-close" onclick="closeModalDirect()">×</button>
      </div>

      <div class="detail-grid">
        <div class="detail-item"><label>From</label><p id="mName">—</p></div>
        <div class="detail-item"><label>Email</label><p id="mEmail">—</p></div>
        <div class="detail-item"><label>Date</label><p id="mDate">—</p></div>
        <div class="detail-item"><label>Subject</label><p id="mSubject">—</p></div>
      </div>

      <p class="modal-section-title">Message</p>
      <div class="message-body" id="mBody">—</div>

      <button class="btn-update" id="markReadBtn" onclick="toggleRead()">Mark as Read</button>
      <button class="btn-secondary" onclick="deleteMessage()">Delete Message</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const isProd = window.location.hostname !== 'localhost';
    const API_BASE = isProd
      ? 'https://nurfia-backend.bonto.run/api'
      : 'http://localhost:5000/api';

    let allMessages = [];
    let currentFilter = 'all';
    let currentMsgId = null;

    const getToken = () => localStorage.getItem('nurfia_token');
    const authHeaders = () => ({
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${getToken()}`
    });

    // Gate Check
    const nurfia_user = localStorage.getItem('nurfia_user');
    const currentUser = nurfia_user ? JSON.parse(nurfia_user) : null;
    const token = getToken();

    if (!token || !currentUser || !currentUser.isAdmin) {
      document.getElementById('adminGate').style.display = 'flex';
      document.getElementById('adminLayout').style.display = 'none';
    } else {
      document.getElementById('adminGate').style.display = 'none';
      document.getElementById('adminLayout').style.display = 'flex';
      loadMessages();
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', handleLogout);

    async function loadMessages() {
      try {
        const res = await fetch(`${API_BASE}/contact/admin/all`, { headers: authHeaders() });
        if (!res.ok) throw new Error(await res.text());
        allMessages = await res.json();
        document.getElementById('msgCount').textContent = `${allMessages.length} messages total`;
        renderTable();
      } catch (err) {
        console.error(err);
        document.getElementById('messagesTableBody').innerHTML =
          `<tr><td colspan="5"><div class="empty-state">⚠️ Could not load messages. Check your API and token.</div></td></tr>`;
        document.getElementById('msgCount').textContent = '—';
      }
    }

    function applyFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTable();
    }

    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allMessages.filter(m => {
        const matchFilter =
          currentFilter === 'all' ||
          (currentFilter === 'unread' && !m.isRead) ||
          (currentFilter === 'read' && m.isRead);
        const matchSearch =
          (m.name || '').toLowerCase().includes(search) ||
          (m.email || '').toLowerCase().includes(search) ||
          (m.subject || '').toLowerCase().includes(search);
        return matchFilter && matchSearch;
      });

      const tbody = document.getElementById('messagesTableBody');
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No messages found.</div></td></tr>`;
        return;
      }

      // Sab se naya message pehle
      const sorted = [...filtered].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      tbody.innerHTML = sorted.map(m => {
        const date = new Date(m.createdAt).toLocaleDateString('en-PK', { day: '2-digit', month: 'short', year: 'numeric' });
        const statusBadge = m.isRead
          ? `<span class="badge badge-read">Read</span>`
          : `<span class="badge badge-unread">Unread</span>`;
        return `
        <tr class="${m.isRead ? '' : 'unread'}">
          <td>${date}</td>
          <td>
            <div class="customer-name">${m.name}</div>
            <div class="customer-email">${m.email}</div>
          </td>
          <td class="subject-cell">${m.subject}</td>
          <td>${statusBadge}</td>
          <td>
            <button class="action-btn" title="View" onclick="openModal('${m._id}')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
            <button class="action-btn delete-btn" title="Delete" onclick="quickDelete('${m._id}')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    function openModal(msgId) {
      const m = allMessages.find(x => x._id === msgId);
      if (!m) return;
      currentMsgId = msgId;

      document.getElementById('modalMsgId').textContent = `#${m._id.slice(-8).toUpperCase()}`;
      document.getElementById('mName').textContent = m.name || '—';
      document.getElementById('mEmail').textContent = m.email || '—';
      document.getElementById('mDate').textContent = new Date(m.createdAt).toLocaleString('en-PK');
      document.getElementById('mSubject').textContent = m.subject || '—';
      document.getElementById('mBody').textContent = m.message || '(No message body)';

      document.getElementById('markReadBtn').textContent = m.isRead ? 'Mark as Unread' : 'Mark as Read';

      document.getElementById('modalOverlay').classList.add('open');

      // Modal khulne par automatically read mark karo (agar abhi unread hai)
      if (!m.isRead) {
        silentMarkRead(msgId);
      }
    }

    async function silentMarkRead(msgId) {
      try {
        const res = await fetch(`${API_BASE}/contact/admin/${msgId}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({ isRead: true })
        });
        if (!res.ok) return;
        const updated = await res.json();
        const idx = allMessages.findIndex(x => x._id === msgId);
        if (idx !== -1) allMessages[idx] = updated;
        renderTable();
        document.getElementById('markReadBtn').textContent = 'Mark as Unread';
      } catch (err) {
        console.error(err);
      }
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modalOverlay').classList.remove('open');
      currentMsgId = null;
    }

    async function toggleRead() {
      if (!currentMsgId) return;
      const m = allMessages.find(x => x._id === currentMsgId);
      const newStatus = !m.isRead;
      try {
        const res = await fetch(`${API_BASE}/contact/admin/${currentMsgId}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({ isRead: newStatus })
        });
        if (!res.ok) throw new Error(await res.text());
        const updated = await res.json();
        const idx = allMessages.findIndex(x => x._id === currentMsgId);
        if (idx !== -1) allMessages[idx] = updated;
        renderTable();
        closeModalDirect();
        showToast(newStatus ? 'Marked as read' : 'Marked as unread');
      } catch (err) {
        console.error(err);
        showToast('Failed to update message');
      }
    }

    async function deleteMessage() {
      if (!currentMsgId) return;
      if (!confirm('Delete this message permanently?')) return;
      try {
        const res = await fetch(`${API_BASE}/contact/admin/${currentMsgId}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        if (!res.ok) throw new Error(await res.text());
        allMessages = allMessages.filter(x => x._id !== currentMsgId);
        renderTable();
        closeModalDirect();
        showToast('Message deleted');
      } catch (err) {
        console.error(err);
        showToast('Failed to delete message');
      }
    }

    async function quickDelete(msgId) {
      if (!confirm('Delete this message permanently?')) return;
      try {
        const res = await fetch(`${API_BASE}/contact/admin/${msgId}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        if (!res.ok) throw new Error(await res.text());
        allMessages = allMessages.filter(x => x._id !== msgId);
        renderTable();
        document.getElementById('msgCount').textContent = `${allMessages.length} messages total`;
        showToast('Message deleted');
      } catch (err) {
        console.error(err);
        showToast('Failed to delete message');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function handleLogout() {
      localStorage.removeItem('nurfia_token');
      localStorage.removeItem('nurfia_user');
      window.location.href = 'index.html';
    }
  </script>
</body>

</html>
