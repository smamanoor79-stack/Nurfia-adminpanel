<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Orders – Nurfia</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .page-header h2 { font-size: 28px; font-weight: 300; letter-spacing: .5px; color:#1a1a1a; }
    .page-header p  { font-size: 13px; color: #888; margin-top: 4px; }

    .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid #ddd; background: #fff;
      font-size: 12px; cursor: pointer; color: #555;
      transition: all .15s; white-space: nowrap;
    }
    .filter-btn.active, .filter-btn:hover { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
    .search-box {
      margin-left: auto; padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px;
      font-size: 12px; background: #fff; color: #333;
      outline: none; width: 220px; min-width: 0;
    }
    .search-box:focus { border-color: #aaa; }

    .table-wrap {
      background: #fff; border-radius: 8px;
      overflow-x: auto; border: 1px solid #e8e8e8;
      -webkit-overflow-scrolling: touch;
    }
    table { width: 100%; border-collapse: collapse; min-width: 640px; }
    thead tr { border-bottom: 1px solid #eee; }
    thead th {
      padding: 13px 16px; text-align: left;
      font-size: 11px; font-weight: 600; color: #999;
      letter-spacing: .8px; text-transform: uppercase; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f2f2f2; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 14px 16px; font-size: 13px; color: #333; vertical-align: middle; }

    .order-id { font-family: monospace; color: #555; font-size: 12px; white-space: nowrap; }
    .customer-name { font-weight: 500; }
    .customer-email { font-size: 11px; color: #999; margin-top: 2px; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-pending    { background: #fff3cd; color: #856404; }
    .badge-paid       { background: #d1fae5; color: #065f46; }
    .badge-delivered  { background: #dbeafe; color: #1e40af; }
    .badge-processing { background: #ede9fe; color: #5b21b6; }

    .action-btn {
      background: none; border: none; cursor: pointer;
      padding: 5px; border-radius: 4px; color: #888;
      transition: background .15s, color .15s;
    }
    .action-btn:hover { background: #f0f0f0; color: #333; }
    .action-btn svg { width: 15px; height: 15px; display: block; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 300;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 10px;
      width: 100%; max-width: 560px; max-height: 90vh;
      overflow-y: auto; padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-head {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 24px; gap: 12px;
    }
    .modal-head h3 { font-size: 18px; font-weight: 600; }
    .modal-head p  { font-size: 12px; color: #888; margin-top: 3px; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 22px; color: #aaa; line-height: 1; flex-shrink: 0;
    }
    .modal-close:hover { color: #333; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 22px; }
    .detail-item label { font-size: 10px; color: #999; letter-spacing: .8px; text-transform: uppercase; }
    .detail-item p     { font-size: 13px; color: #222; margin-top: 3px; font-weight: 500; word-break: break-word; }

    .modal-section-title {
      font-size: 11px; color: #999; letter-spacing: .8px;
      text-transform: uppercase; margin-bottom: 10px; margin-top: 20px;
    }

    .order-item-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f2f2f2; }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-img { width: 44px; height: 52px; object-fit: cover; border-radius: 4px; background: #eee; flex-shrink: 0; }
    .order-item-info { flex: 1; min-width: 0; }
    .order-item-info strong { font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-item-info span  { font-size: 11px; color: #888; }
    .order-item-price { font-size: 13px; font-weight: 600; white-space: nowrap; }

    .status-select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 13px; margin-top: 4px;
      background: #fff; color: #333;
    }
    .btn-update {
      margin-top: 20px; width: 100%;
      padding: 11px; background: #1c1c1e; color: #fff;
      border: none; border-radius: 6px; font-size: 14px;
      cursor: pointer; transition: background .15s;
    }
    .btn-update:hover { background: #2e2e32; }

    .loading, .empty-state { text-align: center; padding: 60px 20px; color: #888; font-size: 14px; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 14px;
      border: 3px solid #eee; border-top-color: #555;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1c1c1e; color: #fff;
      padding: 12px 20px; border-radius: 8px;
      font-size: 13px; opacity: 0; transform: translateY(10px);
      transition: all .25s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 1023px) { .search-box { width: 180px; } }
    @media (max-width: 767px) {
      .page-header h2 { font-size: 22px; }
      .filters { gap: 8px; }
      .search-box { width: 100%; margin-left: 0; order: 5; }
      tbody td { padding: 12px 12px; font-size: 12px; }
      thead th  { padding: 10px 12px; }
      .customer-email { display: none; }
      .modal { padding: 20px 16px; }
      .detail-grid { grid-template-columns: 1fr; gap: 10px; }
      .toast { left: 16px; right: 16px; bottom: 16px; text-align: center; }
    }
    @media (max-width: 400px) {
      .filter-btn { padding: 5px 12px; font-size: 11px; }
      .page-header h2 { font-size: 19px; }
    }
  </style>
</head>
<body class="admin-body">


  <div class="admin-gate" id="adminGate" style="display:none;">
    <div class="admin-gate-box">
      <i class="fa-solid fa-lock"></i>
      <h2>Admin Access Only</h2>
      <p>You don't have permission to view this page.</p>
      <a href="index.html" class="admin-gate-btn">Back to Home</a>
    </div>
  </div>

  <div class="admin-layout" id="adminLayout" style="display:none;">

    <aside class="admin-sidebar">
      <a href="index.html" class="admin-logo">NURFIA</a>
      <p class="admin-sidebar-label">Admin Panel</p>

      <nav class="admin-nav">
        <a href="admindashboard.html" class="admin-nav-item">
          <i class="fa-solid fa-gauge"></i> Dashboard
        </a>
        <a href="adminproduct.html" class="admin-nav-item">
          <i class="fa-solid fa-shirt"></i> Products
        </a>
        <a href="adminorders.html" class="admin-nav-item active">
          <i class="fa-solid fa-box"></i> Orders
        </a>
        <a href="adminusers.html" class="admin-nav-item">
          <i class="fa-solid fa-users"></i> Users
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-back-link"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
        <button class="admin-logout-btn" id="adminLogoutBtn" onclick="handleLogout()">Log Out</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="page-header">
        <div>
          <h2>Orders</h2>
          <p id="orderCount">Loading…</p>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all"       onclick="applyFilter(this)">All</button>
        <button class="filter-btn"        data-filter="pending"   onclick="applyFilter(this)">Pending</button>
        <button class="filter-btn"        data-filter="paid"      onclick="applyFilter(this)">Paid</button>
        <button class="filter-btn"        data-filter="delivered" onclick="applyFilter(this)">Delivered</button>
        <input class="search-box" id="searchInput" type="text"
               placeholder="Search by order ID or customer…" oninput="renderTable()" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order ID</th><th>Customer</th><th>Date</th><th>Items</th>
              <th>Total</th><th>Payment</th><th>Delivery</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr><td colspan="8"><div class="loading"><div class="spinner"></div>Fetching orders…</div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3>Order Details</h3>
          <p id="modalOrderId" class="order-id"></p>
        </div>
        <button class="modal-close" onclick="closeModalDirect()">×</button>
      </div>

      <div class="detail-grid">
        <div class="detail-item"><label>Customer</label><p id="mCustomer">—</p></div>
        <div class="detail-item"><label>Email</label><p id="mEmail">—</p></div>
        <div class="detail-item"><label>Order Date</label><p id="mDate">—</p></div>
        <div class="detail-item"><label>Payment Method</label><p id="mPayment">—</p></div>
        <div class="detail-item"><label>Total Price</label><p id="mTotal">—</p></div>
        <div class="detail-item"><label>Shipping</label><p id="mAddress">—</p></div>
      </div>

      <p class="modal-section-title">Items Ordered</p>
      <div id="mItems"></div>

      <p class="modal-section-title" style="margin-top:24px">Update Status</p>
      <label style="font-size:12px;color:#666">Payment Status</label>
      <select class="status-select" id="mPayStatus">
        <option value="unpaid">Unpaid</option>
        <option value="paid">Paid</option>
      </select>

      <label style="font-size:12px;color:#666;display:block;margin-top:12px">Delivery Status</label>
      <select class="status-select" id="mDelStatus">
        <option value="pending">Pending</option>
        <option value="delivered">Delivered</option>
      </select>

      <button class="btn-update" onclick="updateOrder()">Save Changes</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const API_BASE = 'https://nurfiabackend-nqewxdjc.b4a.run/api';

  let allOrders = [];
  let currentFilter = 'all';
  let currentOrderId = null;

  
  const getToken = () => localStorage.getItem('nurfia_token');
  const authHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` });

  //  Gate Check
  const nurfia_user = localStorage.getItem('nurfia_user');
  const currentUser = nurfia_user ? JSON.parse(nurfia_user) : null;
  const token = getToken();

  if (!token || !currentUser || !currentUser.isAdmin) {
    document.getElementById('adminGate').style.display = 'flex';
    document.getElementById('adminLayout').style.display = 'none';
  } else {
    document.getElementById('adminGate').style.display = 'none';
    document.getElementById('adminLayout').style.display = 'flex';
    loadOrders(); 
  }

  document.getElementById('adminLogoutBtn').addEventListener('click', handleLogout);

  async function loadOrders() {
    try {
      const res = await fetch(`${API_BASE}/orders/admin/all`, { headers: authHeaders() });
      if (!res.ok) throw new Error(await res.text());
      allOrders = await res.json();
      document.getElementById('orderCount').textContent = `${allOrders.length} orders total`;
      renderTable();
    } catch (err) {
      console.error(err);
      document.getElementById('ordersTableBody').innerHTML =
        `<tr><td colspan="8"><div class="empty-state">⚠️ Could not load orders. Check your API and token.</div></td></tr>`;
      document.getElementById('orderCount').textContent = '—';
    }
  }

  function applyFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allOrders.filter(o => {
      const matchFilter =
        currentFilter === 'all' ||
        (currentFilter === 'paid' && o.isPaid) ||
        (currentFilter === 'delivered' && o.isDelivered) ||
        (currentFilter === 'pending' && !o.isPaid && !o.isDelivered);
      const customerName = o.user?.name || '';
      const matchSearch =
        o._id.toLowerCase().includes(search) ||
        customerName.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    const tbody = document.getElementById('ordersTableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">No orders found.</div></td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(o => {
      const date = new Date(o.createdAt).toLocaleDateString('en-PK', { day:'2-digit', month:'short', year:'numeric' });
      const payBadge = o.isPaid
        ? `<span class="badge badge-paid">Paid</span>`
        : `<span class="badge badge-pending">Unpaid</span>`;
      const delBadge = o.isDelivered
        ? `<span class="badge badge-delivered">Delivered</span>`
        : `<span class="badge badge-processing">Pending</span>`;
      return `
        <tr>
          <td class="order-id">#${o._id.slice(-8).toUpperCase()}</td>
          <td>
            <div class="customer-name">${o.user?.name || 'Unknown'}</div>
            <div class="customer-email">${o.user?.email || ''}</div>
          </td>
          <td>${date}</td>
          <td>${o.orderItems.length}</td>
          <td><strong>$${o.totalPrice.toFixed(2)}</strong></td>
          <td>${payBadge}</td>
          <td>${delBadge}</td>
          <td>
            <button class="action-btn" title="View" onclick="openModal('${o._id}')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </td>
        </tr>`;
    }).join('');
  }

  function openModal(orderId) {
    const o = allOrders.find(x => x._id === orderId);
    if (!o) return;
    currentOrderId = orderId;

    document.getElementById('modalOrderId').textContent = `#${o._id.slice(-8).toUpperCase()}`;
    document.getElementById('mCustomer').textContent = o.user?.name || 'Unknown';
    document.getElementById('mEmail').textContent    = o.user?.email || '—';
    document.getElementById('mDate').textContent     = new Date(o.createdAt).toLocaleString('en-PK');
    document.getElementById('mPayment').textContent  = o.paymentMethod;
    document.getElementById('mTotal').textContent    = `$${o.totalPrice.toFixed(2)}`;
    document.getElementById('mAddress').textContent  =
      `${o.shippingAddress.address}, ${o.shippingAddress.city}, ${o.shippingAddress.country} ${o.shippingAddress.postalCode}`;

    document.getElementById('mItems').innerHTML = o.orderItems.map(item => `
      <div class="order-item-row">
        <img class="order-item-img" src="${item.image}" alt="${item.name}"
             onerror="this.src='https://via.placeholder.com/44x52?text=N'" />
        <div class="order-item-info">
          <strong>${item.name}</strong>
          <span>Qty: ${item.quantity}</span>
        </div>
        <span class="order-item-price">$${(item.price * item.quantity).toFixed(2)}</span>
      </div>`).join('');

    document.getElementById('mPayStatus').value = o.isPaid ? 'paid' : 'unpaid';
    document.getElementById('mDelStatus').value = o.isDelivered ? 'delivered' : 'pending';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
    currentOrderId = null;
  }

  async function updateOrder() {
    if (!currentOrderId) return;
    const isPaid      = document.getElementById('mPayStatus').value === 'paid';
    const isDelivered = document.getElementById('mDelStatus').value === 'delivered';
    try {
      const res = await fetch(`${API_BASE}/orders/admin/${currentOrderId}`, {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify({ isPaid, isDelivered })
      });
      if (!res.ok) throw new Error(await res.text());
      const updated = await res.json();
      const idx = allOrders.findIndex(o => o._id === currentOrderId);
      if (idx !== -1) allOrders[idx] = updated;
      renderTable();
      closeModalDirect();
      showToast('Order updated successfully');
    } catch (err) {
      console.error(err);
      showToast('Failed to update order');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function handleLogout() {
    localStorage.removeItem('nurfia_token');
    localStorage.removeItem('nurfia_user');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
